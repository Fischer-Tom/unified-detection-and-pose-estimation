[workspace]
channels = ["conda-forge", "pytorch3d", "iopath"]
name = "unified-detection-and-pose-estimation"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.6.0"

[dependencies]
pytorch-gpu = "*"
cuda-version = "12.6.*"
python = "3.10.*"
iopath = ">=0.1.10,<0.2"
pytorch3d = ">=0.7.7,<0.8"
xformers = ">=0.0.29.post1,<0.0.30"
pixi-pycharm = ">=0.0.8,<0.0.9"

[pypi-dependencies]
bboxtools = ">=1.0.4, <2"
cmake = "==3.31.6"
einops = ">=0.8.1, <0.9"
hydra-core = ">=1.3.2, <2"
imageio = ">=2.37.0, <3"
matplotlib = ">=3.10.3, <4"
opencv-python = ">=4.11.0.86, <5"
rich = ">=14.0.0, <15"
scipy = ">=1.15.3, <2"
scikit-image = ">=0.25.2, <0.26"
triton = "==3.2.0"
wandb = ">=0.19.11, <0.20"
torchvision = "*"
pyprogressivex = { git = "https://github.com/Fischer-Tom/progressive-x.git" }